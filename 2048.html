<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔢 2048</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .game-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: rgba(13,15,26,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
    }
    .home-btn {
      color: #64748b;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.18s;
    }
    .home-btn:hover { color: #e2e8f0; }
    .nav-title { color: #475569; font-size: 0.88rem; }

    body {
      background: #0d0f1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 16px 32px;
      user-select: none;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      color: #f6a623;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    /* Score bar */
    .score-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .score-box {
      background: #161f30;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px 20px;
      text-align: center;
      min-width: 100px;
    }
    .score-label {
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 2px;
    }
    .score-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: #f6a623;
    }

    /* Grid */
    #grid-wrap {
      background: #1a2235;
      border-radius: 14px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 16px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows: repeat(4, 100px);
      gap: 10px;
    }
    .tile {
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: background 0.1s;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn {
      background: rgba(246,166,35,0.15);
      color: #f6a623;
      border: 1px solid rgba(246,166,35,0.3);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s;
    }
    .btn:hover { background: rgba(246,166,35,0.25); }

    .hint {
      color: #475569;
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.7;
    }

    /* Overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,15,26,0.82);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #overlay.show { display: flex; }
    #overlay-title {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1px;
    }
    #overlay-score { color: #94a3b8; font-size: 1.1rem; }
    #overlay-btn {
      background: #f6a623;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.18s;
    }
    #overlay-btn:hover { opacity: 0.85; }
    #overlay-sub {
      color: #64748b;
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      #grid {
        grid-template-columns: repeat(4, 72px);
        grid-template-rows: repeat(4, 72px);
        gap: 8px;
      }
    }
  </style>
</head>
<body>

<nav class="game-nav">
  <a href="index.html" class="home-btn">← 홈으로</a>
  <span class="nav-title">🔢 2048</span>
</nav>

<h1>🔢 2048</h1>
<p class="subtitle">화살표 키로 타일을 밀어 2048을 만드세요</p>

<div class="score-bar">
  <div class="score-box">
    <div class="score-label">점수</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">최고 점수</div>
    <div class="score-value" id="best">0</div>
  </div>
</div>

<div id="grid-wrap">
  <div id="grid"></div>
</div>

<div class="controls">
  <button class="btn" id="new-btn">새 게임</button>
</div>

<p class="hint">화살표 키 또는 WASD · 모바일: 스와이프</p>

<!-- Game Over / Win Overlay -->
<div id="overlay">
  <div id="overlay-title"></div>
  <div id="overlay-score"></div>
  <div id="overlay-sub"></div>
  <button id="overlay-btn">다시 시작</button>
</div>

<script>
  const SIZE = 4;
  let grid, score, best, won, over;

  best = parseInt(localStorage.getItem('2048-best') || '0');

  /* ── INIT ── */
  function init() {
    grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
    score = 0;
    won = false;
    over = false;
    addTile();
    addTile();
    render();
    document.getElementById('overlay').classList.remove('show');
  }

  function addTile() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) empty.push([r, c]);
    if (!empty.length) return false;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return true;
  }

  /* ── SLIDE ── */
  function slideRow(row) {
    let arr = row.filter(v => v !== 0);
    let gain = 0;
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        gain += arr[i];
        arr.splice(i + 1, 1);
      }
    }
    while (arr.length < SIZE) arr.push(0);
    return { arr, gain };
  }

  function transpose(g) {
    return g[0].map((_, c) => g.map(row => row[c]));
  }

  function move(dir) {
    if (over) return;
    let moved = false;
    let gain = 0;
    let g = grid.map(r => [...r]);

    if (dir === 'left') {
      for (let r = 0; r < SIZE; r++) {
        const { arr, gain: g2 } = slideRow(g[r]);
        if (arr.join() !== g[r].join()) moved = true;
        g[r] = arr; gain += g2;
      }
    } else if (dir === 'right') {
      for (let r = 0; r < SIZE; r++) {
        const { arr, gain: g2 } = slideRow([...g[r]].reverse());
        const newRow = arr.reverse();
        if (newRow.join() !== g[r].join()) moved = true;
        g[r] = newRow; gain += g2;
      }
    } else if (dir === 'up') {
      let t = transpose(g);
      for (let r = 0; r < SIZE; r++) {
        const { arr, gain: g2 } = slideRow(t[r]);
        if (arr.join() !== t[r].join()) moved = true;
        t[r] = arr; gain += g2;
      }
      if (moved) g = transpose(t);
    } else if (dir === 'down') {
      let t = transpose(g);
      for (let r = 0; r < SIZE; r++) {
        const { arr, gain: g2 } = slideRow([...t[r]].reverse());
        const newRow = arr.reverse();
        if (newRow.join() !== t[r].join()) moved = true;
        t[r] = newRow; gain += g2;
      }
      if (moved) g = transpose(t);
    }

    if (!moved) return;
    grid = g;
    score += gain;
    if (score > best) { best = score; localStorage.setItem('2048-best', best); }

    addTile();
    render();

    if (!won && grid.flat().includes(2048)) {
      won = true;
      showOverlay('🎉 클리어!', `점수: ${score}`, '계속 진행하거나 새 게임을 시작하세요', true);
    } else if (!canMove()) {
      over = true;
      showOverlay('😵 게임 오버', `최종 점수: ${score}`, '', false);
    }
  }

  function canMove() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) return true;
        if (c < SIZE-1 && grid[r][c] === grid[r][c+1]) return true;
        if (r < SIZE-1 && grid[r][c] === grid[r+1][c]) return true;
      }
    return false;
  }

  /* ── RENDER ── */
  const STYLES = {
    0:    ['#161f30', 'transparent', '0'],
    2:    ['#2563eb', '#fff', '2rem'],
    4:    ['#1d4ed8', '#fff', '2rem'],
    8:    ['#f97316', '#fff', '2rem'],
    16:   ['#ea580c', '#fff', '2rem'],
    32:   ['#dc2626', '#fff', '2rem'],
    64:   ['#b91c1c', '#fff', '2rem'],
    128:  ['#a855f7', '#fff', '1.6rem'],
    256:  ['#9333ea', '#fff', '1.6rem'],
    512:  ['#7c3aed', '#fff', '1.6rem'],
    1024: ['#6d28d9', '#fde68a', '1.25rem'],
    2048: ['#f59e0b', '#1a1a2e', '1.25rem'],
  };

  function tileStyle(val) {
    if (STYLES[val]) return STYLES[val];
    return ['#065f46', '#ecfdf5', '1rem'];
  }

  function render() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;

    const gridEl = document.getElementById('grid');
    gridEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = grid[r][c];
        const [bg, color, fs] = tileStyle(v);
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.cssText = `background:${bg};color:${color};font-size:${fs}`;
        tile.textContent = v || '';
        gridEl.appendChild(tile);
      }
    }
  }

  function showOverlay(title, scoreText, sub, isContinue) {
    const el = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = title;
    document.getElementById('overlay-score').textContent = scoreText;
    document.getElementById('overlay-sub').textContent = sub;
    const btn = document.getElementById('overlay-btn');
    btn.textContent = isContinue ? '계속 하기' : '다시 시작';
    btn.onclick = isContinue ? () => { over = false; el.classList.remove('show'); } : init;
    el.classList.add('show');
  }

  /* ── INPUT ── */
  const KEY_DIR = {
    ArrowLeft: 'left', a: 'left', A: 'left',
    ArrowRight: 'right', d: 'right', D: 'right',
    ArrowUp: 'up', w: 'up', W: 'up',
    ArrowDown: 'down', s: 'down', S: 'down',
  };

  document.addEventListener('keydown', e => {
    const dir = KEY_DIR[e.key];
    if (dir) { e.preventDefault(); move(dir); }
  });

  let tx, ty;
  document.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy))
      move(dx > 0 ? 'right' : 'left');
    else
      move(dy > 0 ? 'down' : 'up');
  }, { passive: true });

  document.getElementById('new-btn').onclick = init;
  document.getElementById('overlay-btn').onclick = init;

  init();
</script>
</body>
</html>
